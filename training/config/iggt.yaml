defaults:
  - default_dataset.yaml

exp_name: iggt_real
img_size: 518
num_workers: 8
seed_value: 42
accum_steps: 2    # Enable gradient accumulation if you hit OOM at this batch size.
patch_size: 14
val_epoch_freq: 5
max_img_per_gpu: 48

# Per-rank batches per epoch. Set to null to auto-derive from len(sampler) so
# the value scales with the dataset(s) you compose. The DynamicBatchSampler
# yields exactly this many batches per epoch (cycling samples if needed) so
# all DDP ranks stay in lockstep — required for the all_reduce in DDP backward.
# Override with an int when you want a fixed-budget epoch (e.g. for faster
# eval or to cap epoch length on very large datasets).
limit_train_batches: null
limit_val_batches: null


data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    batches_per_epoch: ${limit_train_batches}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      repeat_batch: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: train
          CO3D_DIR: /YOUR/PATH/TO/CO3D
          CO3D_ANNOTATION_DIR: /YOUR/PATH/TO/CO3D_ANNOTATION
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    batches_per_epoch: ${limit_val_batches}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: test
          CO3D_DIR: /YOUR/PATH/TO/CO3D
          CO3D_ANNOTATION_DIR: /YOUR/PATH/TO/CO3D_ANNOTATION


logging:
  log_dir: logs
  log_visuals: False
  log_freq: 50
  log_level_primary: INFO
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
        - loss_mvc
        - loss_pull
        - loss_push
        - loss_consistency
    val:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
        - loss_mvc
        - loss_pull
        - loss_push
        - loss_consistency


checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 1
  resume_checkpoint_path: null
  strict: False


loss:
  _target_: loss.MultitaskLoss
  camera:
    weight: 5.0
    loss_type: "l1"
  depth:
    weight: 1.0
    gradient_loss_fn: "grad"
    valid_range: 0.98
  point: null
  track: null
  mvc:
    weight: 1.0
    delta_pull: 0.25
    delta_push: 1.0
    delta_consistency: 0.5
    min_mask_pixels: 16
    weight_pull: 2.0
    weight_push: 1.0
    weight_consistency: 2.0
    background_id: 0


optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 5e-5
    weight_decay: 0.05

  frozen_module_names:
      - "*aggregator*"

  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["depth"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["track", "part", ""]
        max_norm: 1.0
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 5e-5
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 5e-5
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05


max_epochs: 20

model:
  _target_: iggt.models.vggt.IGGT


distributed:
  backend: nccl
  comms_dtype: None
  find_unused_parameters: True
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
    cudnn_deterministic: False
    cudnn_benchmark: False
    allow_tf32: True
